<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Cube Controller</title>
    <style>
        :root {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #2196f3;
            --accent-hover: #1976d2;
            --border-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1.2fr 1fr;
            }
        }

        .panel {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Image Display Box */
        .image-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .cube-img {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #000;
            border-radius: 4px;
            object-fit: contain;
            border: 1px solid var(--border-color);
        }

        /* Controls */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 12px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-weight: 500;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Log / Response console */
        .log-panel {
            grid-column: 1 / -1;
        }

        .console {
            background-color: #000;
            font-family: monospace;
            padding: 12px;
            border-radius: 4px;
            height: 150px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        .log-entry {
            margin: 4px 0;
            line-height: 1.4;
        }

        .timestamp {
            color: #888;
            margin-right: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Live Camera View -->
        <div class="panel image-container">
            <h2>Camera Live View</h2>
            <img id="liveView" src="" alt="No camera view available" class="cube-img">
        </div>

        <!-- Controls View -->
        <div class="panel">
            <h2>Actions</h2>
            <div class="btn-group">
                <button onclick="sendRequest('/api/cam_status')">Check Camera Status</button>
                <button onclick="sendRequest('/api/cube_scan')">Scan Cube</button>
                <button onclick="sendRequest('/api/cube_solving')">Solve Cube</button>
                <button onclick="sendRequest('/api/cube_scramble')">Scramble Cube</button>
            </div>
        </div>

        <!-- Output Console -->
        <div class="panel log-panel">
            <h2>Activity Log</h2>
            <div id="console" class="console">
                <div class="log-entry"><span class="timestamp">[System]</span>Console ready...</div>
            </div>
        </div>
    </div>

    <script>
        const updateIntervalMs = 500; // Refreshes image every 500ms
        const liveViewImage = document.getElementById("liveView");
        let lastTimestamp = null;

        // Polls the server to check if the image has changed, loading path dynamically
        async function checkImageUpdate() {
            try {
                const response = await fetch('/api/image_timestamp');
                if (!response.ok) return;
                
                const data = await response.json();

                // Only reload if the server timestamp changes
                if (data.timestamp !== lastTimestamp) {
                    lastTimestamp = data.timestamp;
                    liveViewImage.src = `${data.path}?t=${data.timestamp}`;
                }
            } catch (error) {
                console.error("Failed to check image update:", error);
            }
        }

        // Start checking for updates
        setInterval(checkImageUpdate, updateIntervalMs);

        // Helper to log actions onto the dashboard log-panel
        function logMessage(msg) {
            const consoleDiv = document.getElementById("console");
            const time = new Date().toLocaleTimeString();
            
            const logEntry = document.createElement("div");
            logEntry.className = "log-entry";
            logEntry.innerHTML = `<span class="timestamp">[${time}]</span>${msg}`;
            
            consoleDiv.appendChild(logEntry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        // Handles GET Requests to the defined endpoints
        async function sendRequest(endpoint) {
            logMessage(`Sending request to ${endpoint}...`);
            try {
                const response = await fetch(endpoint);
                const text = await response.text();
                logMessage(`Response: ${text}`);
            } catch (error) {
                logMessage(`Error: Unable to complete request to ${endpoint}`);
                console.error(error);
            }
        }
    </script>
</body>
</html>
